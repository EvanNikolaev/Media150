<!DOCTYPE html>
<html>
<head>
  <title>Interactive Story</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      text-align: center;
      padding: 40px;
    }

    #story-box {
      background: yellow;
      padding: 30px;
      border-radius: 12px;
      max-width: 750px;
      margin: auto;
      box-shadow: 0 0 10px gray;
    }

    h1 {
      margin-bottom: 20px;
    }

    #story {
      font-size: 18px;
      margin-bottom: 25px;
    }

    .choice-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .choice-card {
      width: 250px;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .choice-card:hover {
      transform: scale(1.05);
    }

    .choice-card img {
      width: 100%;
      height: 170px;
      object-fit: cover;
    }

    .choice-card button {
      width: 100%;
      padding: 15px;
      border: none;
      background: #333;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .choice-card button:hover {
      background: #555;
    }

    .restart-btn {
      margin-top: 20px;
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      background: black;
      color: white;
      border-radius: 8px;
    }

    .restart-btn:hover {
      background: #444;
    }
  </style>
</head>

<body>

  <div id="story-box">
    <h1>The Big Project</h1>

    <p id="story">
      You have a big school project due tomorrow. This project is worth 40% of your final grade. What do you do?
    </p>

    <div id="choices" class="choice-container">

      <!-- Choice 1 -->
      <div class="choice-card" onclick="chooseStartWork()">
        <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1200&auto=format&fit=crop" alt="Student working">
        <button>Start working now</button>
      </div>

      <!-- Choice 2 -->
      <div class="choice-card" onclick="choosePlayGames()">
        <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200&auto=format&fit=crop" alt="Playing video games">
        <button>Play video games instead</button>
      </div>

    </div>
  </div>

  <script>
    const story = document.getElementById("story");
    const choices = document.getElementById("choices");

    function chooseStartWork() {
      story.innerHTML =
        "You start your project early, but realize it is going to be much harder to do by yourself. Do you ask for help or work alone?";

      choices.innerHTML = `
        <div class="choice-card" onclick="endingHelp()">
          <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d?q=80&w=1200&auto=format&fit=crop" alt="Students helping">
          <button>Ask for help</button>
        </div>

        <div class="choice-card" onclick="endingAlone()">
          <img src="https://images.unsplash.com/photo-1503676260728-1c00da094a0b?q=80&w=1200&auto=format&fit=crop" alt="Working alone">
          <button>Work alone</button>
        </div>
      `;
    }

    function choosePlayGames() {
      story.innerHTML =
        "You play video games for a while. Do you stop early or keep playing all night?";

      choices.innerHTML = `
        <div class="choice-card" onclick="endingStop()">
          <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop" alt="Back to studying">
          <button>Stop early and work</button>
        </div>

        <div class="choice-card" onclick="endingFail()">
          <img src="https://images.unsplash.com/photo-1542751110-97427bbecf20?q=80&w=1200&auto=format&fit=crop" alt="Gaming all night">
          <button>Keep playing all night</button>
        </div>
      `;
    }

    function endingHelp() {
      story.innerHTML =
        "You ask for help, finish early, strengthen your friendship, and feel less stressed. Lesson: teamwork and responsibility lead to greater success.";

      choices.innerHTML = `
        <button class="restart-btn" onclick="location.reload()">Restart Story</button>
      `;
    }

    function endingAlone() {
      story.innerHTML =
        "You finish, but it was stressful and you get less sleep. Lesson: working hard matters, but asking for help can help you in the long run.";

      choices.innerHTML = `
        <button class="restart-btn" onclick="location.reload()">Restart Story</button>
      `;
    }

    function endingStop() {
      story.innerHTML =
        "You stop playing and barely finish. You get almost no sleep and your work is sloppy. Lesson: it is never too late to make a better choice, but distractions can hurt your performance.";

      choices.innerHTML = `
        <button class="restart-btn" onclick="location.reload()">Restart Story</button>
      `;
    }

    function endingFail() {
      story.innerHTML =
        "You keep playing video games, never finish the project, and fail the class. Lesson: procrastination has consequences.";

      choices.innerHTML = `
        <button class="restart-btn" onclick="location.reload()">Restart Story</button>
      `;
    }
  </script>

</body>
</html>
